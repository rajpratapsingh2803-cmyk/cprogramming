<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Complete</title>
    <link rel="stylesheet" href="birthday-finish.css">
</head>
<body>
    <div class="finish-card">
        <div class="confetti-container" id="confetti"></div>
        <img class="photo" src="guddu.jpg" alt="Her photo">
        <h1>🎉 Happy Birthday, Guddu! 🎉</h1>
        <p>The egg surprise is revealed — her birthday photo is ready to enjoy.</p>
        <p>Thanks for opening the surprise. Now celebrate Guddu’s special day!</p>
        <p class="note"><a href="birthday.html">Back to gift page</a></p>
    </div>
    <script>
        const confettiContainer = document.getElementById('confetti');
        const colors = ['#ff80bf', '#ffd1a9', '#ffe066', '#8ad3ff', '#b694ff'];

        function createConfettiPiece() {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = `${Math.random() * 100}%`;
            piece.style.background = colors[Math.floor(Math.random() * colors.length)];
            piece.style.opacity = String(0.8 + Math.random() * 0.2);
            piece.style.transform = `rotate(${Math.random() * 360}deg)`;
            piece.style.animationDuration = `${2 + Math.random() * 1.5}s`;
            piece.style.animationDelay = `${Math.random() * 0.5}s`;
            confettiContainer.appendChild(piece);

            piece.addEventListener('animationend', () => {
                piece.remove();
            });
        }

        for (let i = 0; i < 30; i += 1) {
            createConfettiPiece();
        }
    </script>
</body>
</html>
